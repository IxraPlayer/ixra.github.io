<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ixra | Space</title>
    <style>
        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0d1117, #161b22, #0a192f, #1c1c2b);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #58a6ff;
            text-shadow: 0px 0px 20px rgba(88, 166, 255, 0.4);
            letter-spacing: 2px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #30363d;
            margin-bottom: 30px;
            object-fit: cover;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.5);
        }

        .links-container {
            width: 100%;
            max-width: 400px;
        }

        .btn-wrapper {
            position: relative;
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 2px;
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff);
            background-size: 300% 300%;
            animation: border-flow 5s linear infinite;
        }

        .btn {
            background-color: #161b22;
            border-radius: 13px;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            display: block;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .btn:hover {
            background-color: rgba(22, 27, 34, 0.8);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Ixra</h1>

    <img src="https://github.com/IxraPlayer.png" alt="Ixra Profile" class="profile-pic">

    <div class="links-container">
        <div class="btn-wrapper">
            <a href="#" class="btn">Link 1</a>
        </div>
        <div class="btn-wrapper">
            <a href="#" class="btn">Link 2</a>
        </div>
        <div class="btn-wrapper">
            <a href="#" class="btn">Link 3</a>
        </div>
        <div class="btn-wrapper">
            <a href="#" class="btn">Link 4</a>
        </div>
    </div>

</body>
</html>
