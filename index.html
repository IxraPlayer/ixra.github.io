<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ixra</title>
    <style>
        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0d1117, #161b22, #0a192f, #1c1c2b);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #58a6ff;
            text-shadow: 0px 0px 20px rgba(88, 166, 255, 0.4);
            letter-spacing: 2px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #58a6ff;
            margin: 15px 0 30px 0;
            object-fit: cover;
            box-shadow: 0px 0px 15px rgba(88, 166, 255, 0.2);
        }

        .links-container {
            width: 100%;
            max-width: 400px;
        }

        .btn-wrapper {
            position: relative;
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 2px;
            background: linear-gradient(90deg, #001f3f, #0074d9, #1e3a8a);
            background-size: 300% 300%;
            animation: border-flow 6s linear infinite;
        }

        .btn {
            background-color: #0d1117;
            border-radius: 13px;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            display: block;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        .sub-buttons {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 10px;
        }

        .sub-buttons.open {
            max-height: 200px;
            padding: 10px;
        }

        .sub-btn {
            background-color: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            color: #c9d1d9;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .sub-btn:hover {
            background-color: rgba(88, 166, 255, 0.2);
            color: #58a6ff;
        }
    </style>
</head>
<body>

    <h1>Ixra</h1>

    <img src="https://github.com/IxraPlayer.png" alt="Ixra" class="profile-pic">

    <div class="links-container">
        <div class="btn-wrapper">
            <div class="btn" onclick="toggleLinks()">Modlarım</div>
            <div id="subLinks" class="sub-buttons">
                <a href="MODRINTH_LINKI_BURAYA" class="sub-btn" target="_blank">Modrinth</a>
                <a href="CURSEFORGE_LINKI_BURAYA" class="sub-btn" target="_blank">CurseForge</a>
            </div>
        </div>
        
        <div class="btn-wrapper">
            <a href="#" class="btn">Discord</a>
        </div>
        <div class="btn-wrapper">
            <a href="#" class="btn">YouTube</a>
        </div>
    </div>

    <script>
        function toggleLinks() {
            const subLinks = document.getElementById('subLinks');
            subLinks.classList.toggle('open');
        }
    </script>

</body>
</html>
