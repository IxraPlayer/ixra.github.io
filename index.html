<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ixra | Minecraft Mod Developer</title>
    
    <meta name="description" content="Ixra is a Turkish Minecraft mod developer. Creator of Arda's Sculks, Arda's Ores, and more.">
    <meta name="keywords" content="Ixra, IxraPlayer, Minecraft, Mod, Developer, Turkish, Arda's Sculks">

    <meta property="og:title" content="Ixra - Minecraft Mod Developer">
    <meta property="og:description" content="Creator of Arda's Sculks. Turkish Minecraft Modder.">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.15);
            --cyan-glow: rgba(0, 212, 255, 0.45);
            --bg-deep: #050810;
            --bg-card: rgba(8, 14, 28, 0.72);
            --bg-inner: rgba(0, 20, 45, 0.48);
            --text-primary: #e8f3ff;
            --text-muted: #7ba8cc;
            --border: rgba(0, 212, 255, 0.2);
            --border-bright: rgba(0, 212, 255, 0.45);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Sora', system-ui, sans-serif;
            font-weight: 400;
            padding: 20px 16px;
            background: var(--bg-deep);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0, 100, 180, 0.11) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 70%, rgba(0, 60, 140, 0.09) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.022) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .profile-card {
            max-width: 920px;
            width: 100%;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 34px 26px;
            box-shadow:
                0 0 0 1px var(--border),
                0 0 40px rgba(0, 200, 255, 0.08),
                0 28px 60px rgba(0, 0, 0, 0.55);
            color: var(--text-primary);
            position: relative;
            z-index: 1;
            animation: cardIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 22px;
            padding-bottom: 22px;
            border-bottom: 1px solid var(--border);
        }

        .avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 2px solid var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow), 0 6px 18px rgba(0,0,0,0.5);
            background: #0f1a2e;
        }

        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 1.5px dashed rgba(0,212,255,0.28);
            animation: spin 12s linear infinite;
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .header-text h1 {
            font-size: 30px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 0 18px var(--cyan-glow);
            line-height: 1;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 400;
            font-family: 'Space Mono', monospace;
        }

        .bio-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 7px;
            margin-top: 11px;
        }

        .bio-tag {
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--cyan-dim);
            border: 1px solid var(--border-bright);
            color: var(--cyan);
            white-space: nowrap;
        }

        .bio-downloads-tag {
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.38);
            color: #e0f0ff;
            white-space: nowrap;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 275px;
            gap: 18px;
            margin-bottom: 22px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 11px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-inner);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 13px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--cyan-dim), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .link-btn:hover::before { opacity: 1; }

        .link-btn:hover {
            border-color: var(--cyan);
            color: #fff;
            transform: translateX(4px);
            box-shadow: -3px 0 0 0 var(--cyan), 0 0 18px rgba(0,212,255,0.12);
        }

        .link-icon {
            width: 18px;
            height: 18px;
            opacity: 0.65;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        .link-btn:hover .link-icon { opacity: 1; }

        .sculks-card {
            background: var(--bg-inner);
            border: 1px solid var(--border-bright);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px 16px 17px;
            box-shadow:
                0 0 28px rgba(0,212,255,0.07),
                inset 0 0 36px rgba(0,50,100,0.18);
            position: relative;
            overflow: hidden;
        }

        .sculks-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        }

        .sculks-mod-img-wrap {
            position: relative;
            margin-bottom: 13px;
        }

        .sculks-mod-img {
            width: 78px;
            height: 78px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid var(--border-bright);
            box-shadow: 0 0 20px var(--cyan-glow), 0 5px 14px rgba(0,0,0,0.5);
            background: #0d1a2e;
            display: block;
            image-rendering: pixelated;
        }

        .sculks-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: var(--cyan);
            border-radius: 50%;
            border: 2px solid var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #050810;
        }

        .sculks-name {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 12px var(--cyan-glow);
            text-align: center;
            margin-bottom: 3px;
        }

        .sculks-sub {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 16px;
        }

        .sculks-stats {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 9px;
            margin-bottom: 16px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0,0,0,0.22);
            border-radius: 9px;
            border: 1px solid rgba(0,212,255,0.09);
        }

        .stat-label {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--cyan);
            font-family: 'Space Mono', monospace;
            text-shadow: 0 0 8px var(--cyan-glow);
        }

        .stat-row.total-row {
            border-color: rgba(0,212,255,0.28);
            background: rgba(0,212,255,0.055);
        }

        .stat-row.total-row .stat-value {
            color: #fff;
            text-shadow: 0 0 12px var(--cyan);
        }

        .sculks-links {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .sculks-link {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: var(--cyan-dim);
            border-radius: 9px;
            color: var(--cyan);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Space Mono', monospace;
            transition: all 0.18s ease;
            border: 1px solid var(--border-bright);
        }

        .sculks-link:hover {
            background: var(--cyan);
            color: #050810;
            border-color: var(--cyan);
            box-shadow: 0 0 16px var(--cyan-glow);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 17px;
        }

        .footer a {
            color: var(--cyan);
            text-decoration: none;
        }

        .loading-val {
            color: var(--text-muted);
            font-size: 13px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .error-val { color: #ff6b6b; font-size: 13px; }

        @media (max-width: 680px) {
            .profile-header { flex-direction: column; text-align: center; }
            .bio-row { justify-content: center; }
            .main-content { grid-template-columns: 1fr; }
            .profile-card { padding: 22px 14px; }
        }
    </style>
</head>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfilePage",
  "mainEntity": {
    "@type": "Person",
    "name": "Ixra",
    "alternateName": "IxraPlayer",
    "description": "Turkish Minecraft mod developer, creator of Arda's Sculks and other mods.",
    "url": "https://ixraplayer.github.io/",
    "sameAs": [
      "https://x.com/IxraPlayer",
      "https://github.com/IxraPlayer",
      "https://modrinth.com/user/Ixra"
    ],
    "knowsAbout": ["Minecraft Modding", "Java", "Game Design"],
    "nationality": "Turkey",
    "homeLocation": { "@type": "City", "name": "Istanbul" },
    "age": "17"
  }
}
</script>

<script>
(async function () {

    const MR_USERNAME   = 'Ixra';
    const MR_SLUG_AS    = 'ardas-sculks';
    const CF_SLUG_AS    = 'ardas-sculks';
    const CF_USER_SLUGS = ['ardas-sculks', 'ardas-ores'];

    function fmt(n) {
        if (n === null || n === undefined || isNaN(n)) return '?';
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
        if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'K';
        return n.toString();
    }

    function setEl(id, text, isError = false) {
        const el = document.getElementById(id);
        if (!el) return;
        if (isError) {
            el.innerHTML = '<span class="error-val">N/A</span>';
        } else {
            el.textContent = text;
        }
    }

    async function fetchModrinthProject(slug) {
        const r = await fetch('https://api.modrinth.com/v2/project/' + slug);
        if (!r.ok) throw new Error('MR ' + slug + ' ' + r.status);
        const d = await r.json();
        if (d.icon_url) {
            const img = document.getElementById('sculks-icon');
            if (img) img.src = d.icon_url;
        }
        return d.downloads || 0;
    }

    async function fetchModrinthUserTotal(username) {
        const r = await fetch('https://api.modrinth.com/v2/user/' + username + '/projects');
        if (!r.ok) throw new Error('MR user ' + r.status);
        const projects = await r.json();
        return projects.reduce((sum, p) => sum + (p.downloads || 0), 0);
    }

    async function fetchCFWidget(slug) {
        const r = await fetch('https://api.cfwidget.com/minecraft/mc-mods/' + slug);
        if (!r.ok) throw new Error('cfwidget ' + slug + ' ' + r.status);
        const d = await r.json();
        return d.downloads?.total ?? d.downloadCount ?? 0;
    }

    async function fetchCFUserTotal(slugs) {
        const results = await Promise.allSettled(slugs.map(s => fetchCFWidget(s)));
        return results.reduce((sum, r) => r.status === 'fulfilled' ? sum + r.value : sum, 0);
    }

    const [mrAS, cfAS, mrTotal, cfTotal] = await Promise.all([

        fetchModrinthProject(MR_SLUG_AS).catch(() => {
            setEl('modrinth-downloads', '', true);
            return 0;
        }),

        fetchCFWidget(CF_SLUG_AS).catch(() => {
            setEl('curseforge-downloads', '', true);
            return 0;
        }),

        fetchModrinthUserTotal(MR_USERNAME).catch(() => 0),

        fetchCFUserTotal(CF_USER_SLUGS).catch(() => 0)

    ]);

    setEl('modrinth-downloads',   fmt(mrAS));
    setEl('curseforge-downloads', fmt(cfAS));
    setEl('ardas-total',          fmt(mrAS + cfAS));
    setEl('total-downloads',      fmt(mrTotal + cfTotal) + '+');

})();
</script>
