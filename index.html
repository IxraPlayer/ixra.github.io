<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ixra | Space</title>
    <style>
        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0d1117, #161b22, #0a192f, #1c1c2b);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: #58a6ff;
            text-shadow: 0px 0px 20px rgba(88, 166, 255, 0.4);
            letter-spacing: 2px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #58a6ff;
            margin: 15px 0 30px 0;
            object-fit: cover;
            box-shadow: 0px 0px 15px rgba(88, 166, 255, 0.2);
        }

        .links-container {
            width: 100%;
            max-width: 400px;
        }

        .btn-wrapper {
            position: relative;
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
            padding: 2px;
            background: linear-gradient(90deg, #001f3f, #0074d9, #1e3a8a);
            background-size: 300% 300%;
            animation: border-flow 6s linear infinite;
        }

        .btn {
            background-color: #0d1117;
            border-radius: 13px;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: 500;
            display: block;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        .sub-buttons {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 10px;
        }

        .sub-buttons.open {
            max-height: 500px;
            padding: 10px;
        }

        .platform-btn {
            background-color: rgba(88, 166, 255, 0.15);
            border: 1px solid rgba(88, 166, 255, 0.4);
            border-radius: 12px;
            padding: 14px;
            color: #58a6ff;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .mod-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 5px;
            padding-left: 15px;
            border-left: 2px solid rgba(88, 166, 255, 0.2);
        }

        .mod-list.active {
            max-height: 300px;
            margin-bottom: 10px;
        }

        .mod-item {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .mod-item:hover {
            background-color: rgba(88, 166, 255, 0.1);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>Ixra</h1>

    <img src="https://github.com/IxraPlayer.png" alt="Ixra" class="profile-pic">

    <div class="links-container">
        
        <div class="btn-wrapper">
            <div class="btn" onclick="toggleSection('mainModContainer')">Modlarım</div>
            <div id="mainModContainer" class="sub-buttons">
                
                <div class="platform-btn" onclick="toggleSection('modrinthList')">Modrinth</div>
                <div id="modrinthList" class="mod-list">
                    <a href="#" class="mod-item">Mod 1 (Modrinth)</a>
                    <a href="#" class="mod-item">Mod 2 (Modrinth)</a>
                </div>

                <div class="platform-btn" onclick="toggleSection('curseforgeList')">CurseForge</div>
                <div id="curseforgeList" class="mod-list">
                    <a href="#" class="mod-item">Mod 1 (CurseForge)</a>
                    <a href="#" class="mod-item">Mod 2 (CurseForge)</a>
                </div>

            </div>
        </div>
        
        <div class="btn-wrapper">
            <a href="#" class="btn">Discord</a>
        </div>
    </div>

    <script>
        function toggleSection(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('sub-buttons')) {
                el.classList.toggle('open');
            } else {
                el.classList.toggle('active');
            }
        }
    </script>

</body>
</html>
